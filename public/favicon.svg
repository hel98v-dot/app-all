<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1426"/>
      <stop offset="0.55" stop-color="#070d1c"/>
      <stop offset="1" stop-color="#04060d"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.42" r="0.6">
      <stop offset="0" stop-color="#2f7bff" stop-opacity="0.55"/>
      <stop offset="0.55" stop-color="#8b5cff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9af2ff"/>
      <stop offset="1" stop-color="#38e1ff"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Sfondo -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#halo)"/>

  <!-- Griglia tenue -->
  <g stroke="#38e1ff" stroke-opacity="0.07" stroke-width="2">
    <path d="M0 128 H512 M0 256 H512 M0 384 H512 M128 0 V512 M256 0 V512 M384 0 V512"/>
  </g>

  <!-- Portale esagonale -->
  <polygon points="256,70 408,160 408,352 256,442 104,352 104,160"
    fill="none" stroke="#2f7bff" stroke-opacity="0.5" stroke-width="6"/>
  <polygon points="256,96 386,172 386,340 256,416 126,340 126,172"
    fill="none" stroke="url(#cyan)" stroke-opacity="0.9" stroke-width="3" filter="url(#glow)"/>

  <!-- "A" ascendente -->
  <g filter="url(#glow)" fill="none" stroke="url(#cyan)" stroke-width="34"
     stroke-linecap="round" stroke-linejoin="round">
    <path d="M180 360 L256 158 L332 360"/>
    <path d="M212 286 L300 286"/>
  </g>

  <!-- Scintilla apice -->
  <circle cx="256" cy="150" r="9" fill="#ffffff" filter="url(#glow)"/>
</svg>
